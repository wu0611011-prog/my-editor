<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman Low Poly Home</title>
    <style>
        :root {
            --primary-yellow: #FFD700;
            --bg-warm: #E6D5B8;
            --text-color: #5D4037;
        }

        /* 1. 采用 SF 风格系统字体 */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
        }

        body {
            background-color: var(--bg-warm);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 首页区域 */
        .hero-section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--bg-warm);
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .start-btn {
            position: relative;
            z-index: 10;
            margin-top: 30vh;
            padding: 18px 60px;
            font-size: 1.6rem;
            font-weight: 800;
            color: #5D4037;
            background-color: var(--primary-yellow);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .start-btn:hover {
            transform: scale(1.1) translateY(-5px);
        }

        /* 第二屏展示区 */
        .footer-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center; /* 2. 确保整体内容居中 */
        }

        .glass-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(230, 213, 184, 0.7);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: all 1.2s ease;
        }

        .content {
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(60px);
            transition: all 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            width: 100%;
        }

        .content h2 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #3E2723;
            margin-bottom: 25px;
        }

        /* 成员名单居中排列 */
        .member-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; /* 确保成员名字居中 */
            gap: 25px;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
        }

        .scrolled .glass-overlay { opacity: 1; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
        .scrolled .content { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="glass-overlay"></div>

    <section class="hero-section">
        <img src="bg01.jpg" id="main-bg" alt="Pacman World" class="hero-image" onerror="this.style.display='none'">
        <button class="start-btn" onclick="window.location.href='https://wu0611011-prog.github.io/my-editor/'">START</button>
    </section>

    <section class="footer-section">
        <div class="content">
            <h2>Design by <strong>广工四条</strong> </h2>
            <div class="member-list">
                <span>吴昇恒</span>
                <span>杨城沣</span>
                <span>邓浩杰</span>
                <span>何劲诚</span>
            </div>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            if (window.scrollY > window.innerHeight * 0.2) {
                document.body.classList.add('scrolled');
            } else {
                document.body.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
